<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動故事-在課室分享積木</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FFD93D;
            --secondary: #6BCB77;
            --accent: #FF6B6B;
            --blue-3d: linear-gradient(145deg, #3498db, #2980b9);
            --bg: #F0F7FF;
        }

        body {
            font-family: 'Chalkboard SE', "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        header { background: var(--primary); width: 100%; padding: 10px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-buttons { margin: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        
        button {
            padding: 10px 15px; font-size: 0.95rem; border: none; border-radius: 25px;
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .level-btn { background: white; border: 2px solid var(--secondary); }
        .active-level { background: var(--secondary); color: white; }

        .game-container {
            width: 90%; max-width: 500px; background: white; padding: 15px;
            border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px; position: relative; box-sizing: border-box;
        }

        /* Level 1: Tap Selection */
        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .story-card {
            position: relative; aspect-ratio: 1/1; border-radius: 12px;
            border: 4px solid #eee; overflow: hidden; cursor: pointer;
        }
        .story-card.selected { border-color: var(--secondary); }
        .story-card img { width: 100%; height: 100%; object-fit: cover; }
        .badge {
            position: absolute; top: 5px; left: 5px; background: var(--secondary);
            color: white; width: 25px; height: 25px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        .wrong-emoji { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; display: none; }

        /* Level 2: 3D Audio Button & Hints */
        .audio-btn-3d {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--blue-3d); border: none;
            box-shadow: 0 5px 0 #1c5980, 0 8px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 10px auto; cursor: pointer; color: white; font-size: 28px;
        }
        .audio-btn-3d:active { transform: translateY(3px); box-shadow: 0 2px 0 #1c5980; }
        .hint-btn { background: #eee; margin: 5px; padding: 8px; font-size: 0.8rem; }
        .hint-img-container { margin-top: 10px; border: 2px dashed #ccc; padding: 5px; display: none; }
        .full-story-view img { width: 48%; margin: 1%; border-radius: 5px; }

        /* Level 3: Storytelling */
        .big-img-container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; }
        .big-img-container img { width: 100%; display: block; }
        .marker-star {
            position: absolute; font-size: 40px; color: rgba(255, 215, 0, 0.6);
            pointer-events: auto; transform: translate(-50%, -50%);
        }
        .grammar-cue {
            background: #fff9e6; padding: 10px; margin: 10px 0;
            border-radius: 10px; display: flex; align-items: center; justify-content: space-between;
            border: 2px solid #ffeaa7; cursor: pointer;
        }
        .grammar-cue.checked::after { content: "✅"; }
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; }
        .progress-bar { height: 100%; background: var(--secondary); border-radius: 5px; transition: 0.3s; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header><h1>互動故事-在課室分享積木</h1></header>

<div class="nav-buttons">
    <button class="level-btn active-level" onclick="showLevel(1)">1. 排列次序</button>
    <button class="level-btn" onclick="showLevel(2)">2. 故事理解</button>
    <button class="level-btn" onclick="showLevel(3)">3. 我識講故事</button>
</div>

<div id="level1" class="game-container">
    <div id="seq-game">
        <div class="card-grid" id="tap-grid"></div>
        <div style="text-align:right; margin-top:15px;">
            <button onclick="clearSelection()" style="background:#ddd;">清除重選 ↩️</button>
            <button onclick="checkSequence()" style="background:var(--accent); color:white;">完成 ✅</button>
        </div>
    </div>
    <div id="correct-story" class="hidden">
        <h3>做得好！順序係：</h3>
        <div class="card-grid" id="result-grid"></div>
    </div>
</div>

<div id="level2" class="game-container hidden">
    <button class="audio-btn-3d" onclick="speakQuestion()"><span>📢</span></button>
    <h3 id="q-text" style="text-align:center;"></h3>
    
    <div class="nav-buttons">
        <button class="hint-btn" onclick="toggleHint('full')">再次觀看完整故事</button>
        <button class="hint-btn" onclick="toggleHint('relevant')">觀看最相關的圖片</button>
        <button class="hint-btn" onclick="toggleHint('circle')">圈出最相關的細節</button>
    </div>

    <div id="hint-display" class="hint-img-container"></div>
    
    <div style="text-align:center; margin-top:20px;">
        <button onclick="nextQuestion()" style="background:var(--secondary); color:white;">答啱咗！下一題 ⭐</button>
    </div>
</div>

<div id="level3" class="game-container hidden">
    <div class="progress-container"><div id="p-bar" class="progress-bar" style="width: 25%;"></div></div>
    <div class="big-img-container" id="story-teller-canvas" onclick="placeStar(event)">
        <img id="teller-img" src="Story1-1.png">
    </div>
    <div id="grammar-box"></div>
    <button id="next-page-btn" onclick="tellerNext()" style="width:100%; background:var(--primary); margin-top:10px;">下一頁 ➡️</button>
</div>

<script>
    const storyFiles = ['Story1-1.png', 'Story1-2.png', 'Story1-3.png', 'Story1-4.png'];
    let selectedOrder = [];

    // --- Level 1 Logic ---
    function initLevel1() {
        const grid = document.getElementById('tap-grid');
        grid.innerHTML = '';
        selectedOrder = [];
        const shuffled = [...storyFiles].sort(() => Math.random() - 0.5);
        shuffled.forEach(src => {
            const div = document.createElement('div');
            div.className = 'story-card';
            div.innerHTML = `<img src="${src}"><div class="badge hidden"></div><div class="wrong-emoji">❓</div>`;
            div.onclick = () => tapCard(div, src);
            grid.appendChild(div);
        });
        document.getElementById('seq-game').classList.remove('hidden');
        document.getElementById('correct-story').classList.add('hidden');
    }

    function tapCard(el, src) {
        if (selectedOrder.includes(src)) return;
        selectedOrder.push(src);
        const badge = el.querySelector('.badge');
        badge.innerText = selectedOrder.length;
        badge.classList.remove('hidden');
        el.classList.add('selected');
    }

    function clearSelection() {
        initLevel1();
    }

    function checkSequence() {
        const cards = document.querySelectorAll('#tap-grid .story-card');
        let allCorrect = true;
        
        cards.forEach(card => {
            const src = card.querySelector('img').getAttribute('src');
            const userIdx = selectedOrder.indexOf(src);
            const correctIdx = storyFiles.indexOf(src);
            if (userIdx !== correctIdx) {
                card.querySelector('.wrong-emoji').style.display = 'block';
                allCorrect = false;
            } else {
                card.querySelector('.wrong-emoji').style.display = 'none';
            }
        });

        if (allCorrect && selectedOrder.length === 4) {
            confetti();
            setTimeout(() => {
                document.getElementById('seq-game').classList.add('hidden');
                const resGrid = document.getElementById('result-grid');
                resGrid.innerHTML = '';
                storyFiles.forEach(s => resGrid.innerHTML += `<div class="story-card"><img src="${s}"></div>`);
                document.getElementById('correct-story').classList.remove('hidden');
                alert("你好俾心機排次序呀！🎉");
            }, 500);
        }
    }

    // --- Level 2 Logic ---
    let qIdx = 0;
    const questions = [
        { q: "一開始，邊個玩積木？", rel: "Story1-1.png", hint: "story1-q1-hint.png" },
        { q: "男仔喺邊度玩積木?", rel: "Story1-1.png", hint: "story1-q2-hint.png" },
        { q: "女仔想同男仔一齊做咩呀？", rel: "Story1-2.png", hint: "story1-q3-hint.png" },
        { q: "男仔有無同個女仔分享？", rel: "Story1-3.png", hint: "story1-q4-hint.png" },
        { q: "點解老師會俾手指公佢哋？", rel: "Story1-4.png", hint: "story1-q5-hint.png" },
        { q: "玩完積木之後，佢哋應該要做咩呀？", rel: "Story1-4.png", hint: "story1-q6-hint.png" }
    ];

    function updateQuiz() {
        document.getElementById('q-text').innerText = questions[qIdx].q;
        document.getElementById('hint-display').style.display = 'none';
        speakQuestion();
    }

    function speakQuestion() {
        const msg = new SpeechSynthesisUtterance(questions[qIdx].q);
        msg.lang = 'zh-HK';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function toggleHint(type) {
        const display = document.getElementById('hint-display');
        if (display.style.display === 'block') { display.style.display = 'none'; return; }
        
        display.innerHTML = '';
        display.style.display = 'block';
        if (type === 'full') {
            storyFiles.forEach(s => display.innerHTML += `<img src="${s}" style="width:45%; margin:2%">`);
        } else if (type === 'relevant') {
            display.innerHTML = `<img src="${questions[qIdx].rel}" style="width:100%">`;
        } else {
            display.innerHTML = `<img src="${questions[qIdx].hint}" style="width:100%">`;
        }
    }

    function nextQuestion() {
        qIdx = (qIdx + 1) % questions.length;
        updateQuiz();
    }

    // --- Level 3 Logic ---
    let tIdx = 0;
    const grammar = [
        "何時/ 誰/ 哪裏/ 做甚麼",
        "發生甚麼事",
        "怎樣做",
        "最後怎樣/ 覺得怎樣"
    ];

    function initLevel3() {
        tIdx = 0;
        renderTeller();
    }

    function renderTeller() {
        document.getElementById('teller-img').src = storyFiles[tIdx];
        document.getElementById('p-bar').style.width = ((tIdx + 1) / 4 * 100) + "%";
        const box = document.getElementById('grammar-box');
        box.innerHTML = `<div class="grammar-cue" onclick="this.classList.toggle('checked')"><span>🏷️ ${grammar[tIdx]}</span></div>`;
        // Clear stars
        document.querySelectorAll('.marker-star').forEach(s => s.remove());
    }

    function placeStar(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const star = document.createElement('div');
        star.className = 'marker-star';
        star.innerText = '⭐';
        star.style.left = x + 'px';
        star.style.top = y + 'px';
        star.ondblclick = (ev) => { ev.stopPropagation(); star.remove(); };
        e.currentTarget.appendChild(star);
    }

    function tellerNext() {
        if (tIdx < 3) {
            tIdx++;
            renderTeller();
        } else {
            confetti();
            alert("欣賞你好俾心機講故事！");
            showLevel(1);
        }
    }

    function showLevel(lvl) {
        document.querySelectorAll('.game-container').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active-level'));
        document.getElementById('level' + lvl).classList.remove('hidden');
        document.querySelectorAll('.level-btn')[lvl-1].classList.add('active-level');
        if(lvl === 1) initLevel1();
        if(lvl === 2) updateQuiz();
        if(lvl === 3) initLevel3();
    }

    window.onload = () => initLevel1();
</script>
</body>
</html>
