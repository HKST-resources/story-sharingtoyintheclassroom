<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動故事-在課室分享積木3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FFD93D; --secondary: #6BCB77; --accent: #FF6B6B;
            --blue-3d: linear-gradient(145deg, #3498db, #2980b9); --bg: #F0F7FF;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); width: 100%; padding: 10px 0; text-align: center; }
        .nav-buttons { margin: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        
        button { padding: 12px 18px; font-size: 1rem; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .level-btn { background: white; border: 2px solid var(--secondary); }
        .active-level { background: var(--secondary); color: white; }

        .game-container { width: 95%; max-width: 900px; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 20px; box-sizing: border-box; }
        .instruction { background: #E1F5FE; padding: 12px; border-radius: 12px; font-size: 0.95rem; color: #01579B; margin-bottom: 15px; border-left: 5px solid #03A9F4; }

        /* Level 1 */
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 10px auto; width: 100%; justify-items: center; }
        @media (min-width: 600px) { .grid-layout { grid-template-columns: repeat(4, 1fr); } }
        .drop-zone { width: 100%; aspect-ratio: 1/1; border: 3px dashed #ccc; border-radius: 15px; position: relative; display: flex; align-items: center; justify-content: center; }
        .img-card { width: 100%; height: 100%; object-fit: cover; cursor: pointer; border-radius: 12px; }
        .wrong-tag { position: absolute; top: -10px; right: -10px; font-size: 30px; background: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 10; }

        /* Level 2 Hints */
        .audio-btn-3d { width: 70px; height: 70px; border-radius: 50%; background: var(--blue-3d); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; box-shadow: 0 5px 0 #1c5980; }
        .hint-group { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .hint-btn { background: #f0f0f0; text-align: left; padding: 12px; border-radius: 12px; border: 1px solid #ddd; }
        .hint-box { display: none; margin-top: 10px; text-align: center; border: 2px solid #E1F5FE; padding: 10px; border-radius: 15px; }
        .hint-box img { width: 100%; max-width: 400px; border-radius: 8px; }
        .hint-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }

        /* Level 3 */
        .story-teller-wrapper { display: flex; flex-direction: column; gap: 15px; }
        .big-img-container { position: relative; width: 100%; border-radius: 15px; border: 4px solid #eee; overflow: hidden; touch-action: none; }
        .marker-star { position: absolute; font-size: 45px; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; }
        .tool-bar { display: flex; justify-content: flex-end; margin-bottom: 5px; }
        .grammar-card { width: 75px; height: 75px; position: relative; border: 2px solid #eee; border-radius: 12px; cursor: pointer; }
        .grammar-card img { width: 100%; height: 100%; object-fit: contain; }
        .grammar-card.checked::after { content: '✔️'; position: absolute; inset: 0; background: rgba(107, 203, 119, 0.7); display: flex; align-items: center; justify-content: center; font-size: 35px; color: white; border-radius: 10px; }

        @media (min-width: 768px) {
            .story-teller-wrapper { flex-direction: row; }
            .big-img-container { flex: 3; }
            .grammar-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        }

        /* Results Page */
        .result-row { display: flex; gap: 15px; padding: 15px; border-bottom: 2px solid #f0f0f0; align-items: center; }
        .result-row img.main-thumb { width: 160px; border-radius: 10px; }
        .res-icons { display: flex; flex-wrap: wrap; gap: 5px; }
        .res-icons img { width: 45px; height: 45px; border: 1px solid #eee; border-radius: 5px; }
        .res-icons img.grey { filter: grayscale(1); opacity: 0.2; }

        .recording-bar { width: 100%; background: #ff4757; color: white; padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .recording-active { animation: pulse 1.5s infinite; background: #c0392b; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .hidden { display: none; }
    </style>
</head>
<body>

<header><h1>互動故事-在課室分享積木</h1></header>

<div class="nav-buttons">
    <button class="level-btn active-level" onclick="showLevel(1)">1. 排列次序</button>
    <button class="level-btn" onclick="showLevel(2)">2. 故事理解</button>
    <button class="level-btn" onclick="showLevel(3)">3. 我識講故事</button>
</div>

<div id="level1" class="game-container">
    <div class="instruction">家長指南：請點擊下方的圖片。圖片會按點擊順序填入上方的空格。再次點擊空格圖片可撤回。</div>
    <div class="grid-layout" id="seq-box">
        <div class="drop-zone" id="z0"></div>
        <div class="drop-zone" id="z1"></div>
        <div class="drop-zone" id="z2"></div>
        <div class="drop-zone" id="z3"></div>
    </div>
    <div class="grid-layout" id="shuffle-box"></div>
    <div style="text-align:center;"><button onclick="checkLevel1()" style="background:var(--accent); color:white; width:200px;">完成 ✅</button></div>
</div>

<div id="level2" class="game-container hidden">
    <div class="instruction">家長指南：點擊藍色喇叭播放問題，如孩子未能回答，可由上至下點擊提示。</div>
    <button class="audio-btn-3d" onclick="speakQuestion()">📢</button>
    <h3 id="q-text" style="text-align:center;"></h3>
    
    <div class="hint-group">
        <button class="hint-btn" onclick="toggleHint(1)">💡 最少提示：再看一次完整故事</button>
        <div id="hint1" class="hint-box"><div class="hint-grid" id="all-imgs-hint"></div></div>
        
        <button class="hint-btn" onclick="toggleHint(2)">🔍 中等提示：只看最相關的圖咭</button>
        <div id="hint2" class="hint-box"><img id="rel-img-hint" src=""></div>
        
        <button class="hint-btn" onclick="toggleHint(3)">⭕ 最多提示：圈出線索</button>
        <div id="hint3" class="hint-box"><img id="clue-img-hint" src=""></div>
    </div>
    <div style="text-align:center; margin-top:20px;"><button onclick="nextQuestion()" style="background:var(--secondary); color:white; width:150px;">下一題 ⭐</button></div>
</div>

<div id="level3" class="game-container hidden">
    <div id="teller-main">
        <div class="instruction">家長指南：家長可點擊紅色按鈕開始全程錄音，引導孩子說故事。點擊圖片可放置星號作視覺提示（點擊🧹刪除星號），說完對應故事元素後請點擊圖標打勾。</div>
        <div id="rec-status" class="recording-bar" onclick="toggleGlobalRecord()">⏺️ 開始全程錄音</div>
        <div class="tool-bar"><button style="background:none; font-size:24px;" onclick="clearStars()">🧹</button></div>
        <div class="story-teller-wrapper">
            <div class="big-img-container" id="canvas-3" onclick="placeStar(event)">
                <img id="teller-img" style="width:100%; display:block; pointer-events:none;">
            </div>
            <div class="grammar-area" id="grammar-area"></div>
        </div>
        <button onclick="tellerNext()" style="width:100%; background:var(--primary); margin-top:20px;">下一頁 ➡️</button>
    </div>

    <div id="teller-result" class="hidden">
        <div id="export-area" style="background:white; padding:10px;">
            <h3 style="text-align:center;">講故事總結</h3>
            <div id="summary-list"></div>
        </div>
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
            <button onclick="playGlobalRecord()" style="background:var(--blue-3d); color:white; padding:12px; border-radius:20px;">▶️ 重聽故事</button>
            <button onclick="exportRecording()" style="background:#25D366; color:white; padding:12px; border-radius:20px;">🟢 分享或儲存錄音</button>
            <button onclick="captureScreen()" style="background:#3498db; color:white; padding:12px; border-radius:20px;">📸 分享或儲存結果</button>
            <button onclick="location.reload()" style="background:#eee; padding:12px; border-radius:20px;">重新開始</button>
        </div>
    </div>
</div>

<script>
    const storyImgs = ['story1-1.png', 'story1-2.png', 'story1-3.png', 'story1-4.png'];
    let currentSeq = [null, null, null, null];
    let grammarStatus = [[], [], [], []];
    const hooraySound = new Audio('hooray.mp3');

    // --- Level 1 ---
    function initLevel1() {
        const sBox = document.getElementById('shuffle-box');
        sBox.innerHTML = ''; currentSeq = [null, null, null, null];
        renderSequence();
        [...storyImgs].sort(()=>Math.random()-0.5).forEach(src => {
            const img = document.createElement('img'); img.src = src; img.className = 'img-card';
            img.onclick = () => {
                const idx = currentSeq.indexOf(null);
                if(idx!==-1) { currentSeq[idx]=src; img.style.visibility='hidden'; renderSequence(); }
            };
            sBox.appendChild(img);
        });
    }
    function renderSequence() {
        for(let i=0; i<4; i++) {
            const zone = document.getElementById('z'+i); zone.innerHTML = '';
            if(currentSeq[i]) {
                const img = document.createElement('img'); img.src = currentSeq[i]; img.className = 'img-card';
                const handleBack = () => {
                    const src = currentSeq[i]; currentSeq[i] = null;
                    document.querySelectorAll('#shuffle-box img').forEach(si => { if(si.src.includes(src)) si.style.visibility='visible'; });
                    zone.dataset.checked = "false"; renderSequence();
                };
                img.onclick = handleBack; zone.appendChild(img);
                if(zone.dataset.checked === "true" && currentSeq[i] !== storyImgs[i]) {
                    const tag = document.createElement('div'); tag.className='wrong-tag'; tag.innerText='?';
                    tag.onclick = handleBack; zone.appendChild(tag);
                }
            }
        }
    }
    function checkLevel1() {
        let ok = true;
        for(let i=0; i<4; i++) {
            const zone = document.getElementById('z'+i); zone.dataset.checked = "true";
            if(currentSeq[i] !== storyImgs[i]) ok = false;
        }
        renderSequence();
        if(ok && !currentSeq.includes(null)) { confetti(); hooraySound.play(); }
    }

    // --- Level 2 ---
    let qIdx = 0;
    const questions = [
        { q: "1. 一開始，邊個玩積木？", rel: "story1-1.png", clue: "story1-q1-hint.png" },
        { q: "2. 男仔喺邊度玩積木?", rel: "story1-1.png", clue: "story1-q2-hint.png" },
        { q: "3. 女仔想同男仔一齊做咩？", rel: "story1-2.png", clue: "story1-q3-hint.png" },
        { q: "4. 男仔有無同個女仔分享？", rel: "story1-3.png", clue: "story1-q4-hint.png" },
        { q: "5. 點解老師會俾手指公佢哋？", rel: "story1-4.png", clue: "story1-q5-hint.png" },
        { q: "6. 玩完積木之後，佢哋應該要做咩？", rel: "story1-1.png", clue: "story1-q6-hint.png" }
    ];
    function updateQuiz() {
        const item = questions[qIdx];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('rel-img-hint').src = item.rel;
        document.getElementById('clue-img-hint').src = item.clue;
        const grid = document.getElementById('all-imgs-hint'); grid.innerHTML = '';
        storyImgs.forEach(s => grid.innerHTML += `<img src="${s}" style="width:100%">`);
        document.querySelectorAll('.hint-box').forEach(b => b.style.display='none');
        speakQuestion();
    }
    function toggleHint(n) {
        const b = document.getElementById('hint'+n);
        b.style.display = b.style.display === 'block' ? 'none' : 'block';
    }
    function speakQuestion() {
        const msg = new SpeechSynthesisUtterance(questions[qIdx].q.split('. ')[1]);
        msg.lang = 'zh-HK'; speechSynthesis.speak(msg);
    }
    function nextQuestion() {
        if(qIdx < 5) { qIdx++; updateQuiz(); } else { confetti(); hooraySound.play(); }
    }

    // --- Level 3 ---
    let tIdx = 0;
    const grammarConfig = [['when.png','who.png','where.png','what.png'],['initiating-event.png'],['attempt.png'],['consequence.png','reaction.png']];
    function renderTeller() {
        document.getElementById('teller-img').src = storyImgs[tIdx];
        const area = document.getElementById('grammar-area'); area.innerHTML = '';
        grammarConfig[tIdx].forEach(icon => {
            const card = document.createElement('div'); card.className = 'grammar-card';
            if(grammarStatus[tIdx].includes(icon)) card.classList.add('checked');
            card.innerHTML = `<img src="${icon}">`;
            card.onclick = () => {
                card.classList.toggle('checked');
                if(card.classList.contains('checked')) grammarStatus[tIdx].push(icon);
                else grammarStatus[tIdx] = grammarStatus[tIdx].filter(i => i!==icon);
            };
            area.appendChild(card);
        });
        clearStars();
    }
    function placeStar(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const star = document.createElement('div'); star.className = 'marker-star'; star.innerText = '⭐';
        star.style.left = ((e.clientX - rect.left) / rect.width) * 100 + '%';
        star.style.top = ((e.clientY - rect.top) / rect.height) * 100 + '%';
        e.currentTarget.appendChild(star);
    }
    function clearStars() { document.querySelectorAll('.marker-star').forEach(s => s.remove()); }
    function tellerNext() {
        if(tIdx < 3) { tIdx++; renderTeller(); }
        else { if(mediaRecorder && mediaRecorder.state==="recording") stopRec(); showResult(); }
    }
    function showResult() {
        document.getElementById('teller-main').classList.add('hidden');
        document.getElementById('teller-result').classList.remove('hidden');
        const list = document.getElementById('summary-list'); list.innerHTML = '';
        storyImgs.forEach((src, i) => {
            let icons = grammarConfig[i].map(icon => `<img src="${icon}" class="${grammarStatus[i].includes(icon)?'':'grey'}">`).join('');
            list.innerHTML += `<div class="result-row"><img src="${src}" class="main-thumb"><div class="res-icons">${icons}</div></div>`;
        });
        confetti(); hooraySound.play();
    }

    // --- Safari Recording Fix ---
    let mediaRecorder, chunks = [], audioBlob;
    async function toggleGlobalRecord() {
        const btn = document.getElementById('rec-status');
        if(!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.start();
            btn.innerText = "⏹️ 停止錄音"; btn.classList.add('recording-active');
        } else { stopRec(); btn.innerText = "✅ 錄音完成"; btn.classList.remove('recording-active'); }
    }
    function stopRec() {
        if(mediaRecorder) {
            mediaRecorder.stop();
            mediaRecorder.onstop = () => { audioBlob = new Blob(chunks, { type: mediaRecorder.mimeType }); };
        }
    }
    function playGlobalRecord() {
        if(audioBlob) { const a = new Audio(URL.createObjectURL(audioBlob)); a.play(); }
    }
    async function exportRecording() {
        if(!audioBlob) return;
        const file = new File([audioBlob], "story.m4a", { type: audioBlob.type });
        if(navigator.share) await navigator.share({ files: [file], title: '故事錄音' });
    }
    function captureScreen() {
        html2canvas(document.getElementById('export-area'), { scale: 2 }).then(canvas => {
            const img = canvas.toDataURL("image/png");
            const w = window.open();
            w.document.write(`<img src="${img}" style="width:100%">`);
            w.document.title = "長按圖片儲存結果";
        });
    }

    function showLevel(n) {
        document.querySelectorAll('.game-container').forEach(c => c.classList.add('hidden'));
        document.getElementById('level'+n).classList.remove('hidden');
        document.querySelectorAll('.level-btn').forEach((b,i) => b.classList.toggle('active-level', i===n-1));
        if(n===1) initLevel1(); if(n===2) updateQuiz(); if(n===3) { tIdx=0; renderTeller(); }
    }
    window.onload = () => initLevel1();
</script>
</body>
</html>
