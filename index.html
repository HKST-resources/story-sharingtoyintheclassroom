<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動故事-在課室分享積木</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FFD93D;
            --secondary: #6BCB77;
            --accent: #FF6B6B;
            --blue-3d: linear-gradient(145deg, #3498db, #2980b9);
            --bg: #F0F7FF;
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            background-color: var(--bg); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header { background: var(--primary); width: 100%; padding: 10px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-buttons { margin: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        
        button {
            padding: 10px 18px; font-size: 1rem; border: none; border-radius: 25px;
            cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .level-btn { background: white; border: 2px solid var(--secondary); color: #333; }
        .active-level { background: var(--secondary); color: white; box-shadow: 0 4px 0px #4e9a56; }

        .game-container {
            width: 95%; max-width: 800px; background: white; padding: 20px;
            border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            margin-bottom: 20px; box-sizing: border-box;
        }

        .instruction { background: #E1F5FE; padding: 12px; border-radius: 12px; font-size: 0.9rem; color: #01579B; margin-bottom: 15px; border-left: 5px solid #03A9F4; }

        /* Level 1: Shuffle & Sequence */
        .box-title { font-weight: bold; color: #666; margin: 10px 0; font-size: 0.9rem; }
        .grid-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (min-width: 600px) { .grid-layout { grid-template-columns: repeat(4, 1fr); } }

        .drop-zone {
            aspect-ratio: 1/1; border: 3px dashed #ccc; border-radius: 15px;
            position: relative; background: #fafafa; display: flex; align-items: center; justify-content: center;
        }
        .drop-zone::before {
            content: attr(data-num); position: absolute; top: 5px; left: 8px;
            font-size: 1.2rem; font-weight: bold; color: #ddd;
        }

        .img-card {
            width: 100%; height: 100%; border-radius: 12px; cursor: pointer;
            object-fit: cover; transition: transform 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .img-card:hover { transform: scale(1.02); }

        .wrong-float {
            position: absolute; top: -5px; right: -5px; font-size: 35px;
            background: white; border-radius: 50%; line-height: 1; z-index: 10; display: none;
        }

        /* Level 2: Hint Hierarchy */
        .hint-group { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .hint-btn-v3 {
            display: flex; align-items: center; gap: 10px; padding: 12px;
            border-radius: 15px; font-size: 1rem; border: 2px solid transparent; text-align: left;
        }
        .h-low { background: #E8F5E9; color: #2E7D32; border-color: #C8E6C9; }
        .h-mid { background: #FFF3E0; color: #EF6C00; border-color: #FFE0B2; }
        .h-high { background: #FFEBEE; color: #C62828; border-color: #FFCDD2; }

        .audio-btn-3d {
            width: 70px; height: 70px; border-radius: 50%; background: var(--blue-3d);
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 #1c5980; cursor: pointer; border: none;
        }
        .audio-btn-3d span { font-size: 35px; color: white; display: block; margin-top: -2px; }

        /* Level 3: Story Grammar Cards */
        .big-img-container { position: relative; width: 100%; border-radius: 15px; border: 5px solid #eee; overflow: hidden; cursor: crosshair; }
        .big-img-container img { width: 100%; display: block; }
        .marker-star {
            position: absolute; font-size: 45px; opacity: 0.5;
            pointer-events: none; transform: translate(-50%, -50%); user-select: none;
        }

        .grammar-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; }
        .grammar-card {
            width: 80px; height: 80px; position: relative; cursor: pointer;
            border: 2px solid #eee; border-radius: 10px; overflow: hidden;
        }
        .grammar-card img { width: 100%; height: 100%; object-fit: contain; }
        .grammar-card.checked::after {
            content: '✔️'; position: absolute; inset: 0; background: rgba(107, 203, 119, 0.7);
            display: flex; align-items: center; justify-content: center; font-size: 40px; color: white;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header><h1>互動故事-在課室分享積木</h1></header>

<div class="nav-buttons">
    <button class="level-btn active-level" onclick="showLevel(1)">1. 排列次序</button>
    <button class="level-btn" onclick="showLevel(2)">2. 故事理解</button>
    <button class="level-btn" onclick="showLevel(3)">3. 我識講故事</button>
</div>

<div id="level1" class="game-container">
    <div class="instruction">💡 <b>家長指南：</b>請點擊下方的隨機圖片，它們會按順序進入上方的空格。如果想更改位置，再次點擊空格內的圖片即可退回。</div>
    
    <div class="box-title">順序區 (Sequence Box)</div>
    <div class="grid-layout" id="sequence-box">
        <div class="drop-zone" data-num="1" id="q1"></div>
        <div class="drop-zone" data-num="2" id="q2"></div>
        <div class="drop-zone" data-num="3" id="q3"></div>
        <div class="drop-zone" data-num="4" id="q4"></div>
    </div>

    <div class="box-title">待選區 (Shuffle Box)</div>
    <div class="grid-layout" id="shuffle-box"></div>

    <div style="text-align:center; margin-top:20px;">
        <button onclick="checkLevel1()" style="background:var(--accent); color:white; width: 150px;">完成 ✅</button>
    </div>
</div>

<div id="level2" class="game-container hidden">
    <div class="instruction">💡 <b>家長指南：</b>點擊藍色喇叭播放問題。如果孩子回答困難，請按順序提供「弱 -> 強」的提示。</div>
    <button class="audio-btn-3d" onclick="speakQuestion()"><span>📢</span></button>
    <h3 id="q-text" style="text-align:center; color:#2c3e50;"></h3>
    
    <div class="hint-group">
        <button class="hint-btn-v3 h-low" onclick="toggleHint('full')"><span>💡</span> 1級提示：再次觀看完整故事 (最少提示)</button>
        <button class="hint-btn-v3 h-mid" onclick="toggleHint('relevant')"><span>🔍</span> 2級提示：觀看最相關的圖片</button>
        <button class="hint-btn-v3 h-high" onclick="toggleHint('circle')"><span>🎯</span> 3級提示：圈出最相關的細節 (最強提示)</button>
    </div>

    <div id="hint-display" class="hint-img-container" style="display:none; border:2px solid #ddd; border-radius:15px; padding:10px; margin-top:10px;"></div>
    
    <div style="text-align:center; margin-top:20px;">
        <button onclick="nextQuestion()" style="background:var(--secondary); color:white;">答對了！下一題 ⭐</button>
    </div>
</div>

<div id="level3" class="game-container hidden">
    <div class="instruction">💡 <b>家長指南：</b>引導孩子描述圖片。點擊圖片可放置半透明星號引導視覺注意（雙擊星號刪除）。講完對應元素後請點擊下方的圖標打勾。</div>
    <div class="big-img-container" id="canvas-3" onclick="placeStar(event)">
        <img id="teller-img" src="Story1-1.png">
    </div>
    <div class="grammar-grid" id="grammar-icons"></div>
    <button onclick="tellerNext()" style="width:100%; background:var(--primary); margin-top:20px; font-size:1.2rem;">下一頁 ➡️</button>
</div>

<script>
    const storyImgs = ['Story1-1.png', 'Story1-2.png', 'Story1-3.png', 'Story1-4.png'];
    let currentSeq = [null, null, null, null];

    // --- Level 1 Logic ---
    function initLevel1() {
        const sBox = document.getElementById('shuffle-box');
        sBox.innerHTML = '';
        currentSeq = [null, null, null, null];
        renderSequence();

        const shuffled = [...storyImgs].sort(() => Math.random() - 0.5);
        shuffled.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'img-card';
            img.onclick = () => moveToSequence(src, img);
            sBox.appendChild(img);
        });
    }

    function moveToSequence(src, el) {
        const emptyIdx = currentSeq.indexOf(null);
        if (emptyIdx !== -1) {
            currentSeq[emptyIdx] = src;
            el.style.display = 'none';
            renderSequence();
        }
    }

    function renderSequence() {
        for (let i = 0; i < 4; i++) {
            const zone = document.getElementById('q' + (i+1));
            zone.innerHTML = '';
            if (currentSeq[i]) {
                const img = document.createElement('img');
                img.src = currentSeq[i];
                img.className = 'img-card';
                img.onclick = () => removeFromSequence(i);
                const wrong = document.createElement('div');
                wrong.className = 'wrong-float';
                wrong.innerText = '❓';
                zone.appendChild(img);
                zone.appendChild(wrong);
            }
        }
    }

    function removeFromSequence(idx) {
        const src = currentSeq[idx];
        currentSeq[idx] = null;
        // 顯示回 Shuffle Box
        const shuffledImgs = document.querySelectorAll('#shuffle-box img');
        shuffledImgs.forEach(img => {
            if (img.src.includes(src)) img.style.display = 'block';
        });
        renderSequence();
    }

    function checkLevel1() {
        let allCorrect = true;
        currentSeq.forEach((src, i) => {
            const zone = document.getElementById('q' + (i+1));
            const mark = zone.querySelector('.wrong-float');
            if (src !== storyImgs[i]) {
                if(mark) mark.style.display = 'block';
                allCorrect = false;
            } else {
                if(mark) mark.style.display = 'none';
            }
        });
        if (allCorrect && !currentSeq.includes(null)) {
            confetti();
            setTimeout(() => alert("你好俾心機排次序呀！🎉"), 500);
        }
    }

    // --- Level 2 Logic ---
    let qIdx = 0;
    const questions = [
        { q: "一開始，邊個玩積木？", rel: "Story1-1.png", hint: "story1-q1-hint.png" },
        { q: "男仔喺邊度玩積木?", rel: "Story1-1.png", hint: "story1-q2-hint.png" },
        { q: "女仔想同男仔一齊做咩呀？", rel: "Story1-2.png", hint: "story1-q3-hint.png" },
        { q: "男仔有無同個女仔分享？", rel: "Story1-3.png", hint: "story1-q4-hint.png" },
        { q: "點解老師會俾手指公佢哋？", rel: "Story1-4.png", hint: "story1-q5-hint.png" },
        { q: "玩完積木之後，佢哋應該要做咩呀？", rel: "Story1-4.png", hint: "story1-q6-hint.png" }
    ];

    function updateQuiz() {
        document.getElementById('q-text').innerText = questions[qIdx].q;
        document.getElementById('hint-display').style.display = 'none';
        speakQuestion();
    }

    function speakQuestion() {
        const msg = new SpeechSynthesisUtterance(questions[qIdx].q);
        msg.lang = 'zh-HK';
        msg.rate = 0.85;
        window.speechSynthesis.speak(msg);
    }

    function toggleHint(type) {
        const div = document.getElementById('hint-display');
        if (div.style.display === 'block') { div.style.display = 'none'; return; }
        div.style.display = 'block';
        div.innerHTML = '';
        if (type === 'full') {
            storyImgs.forEach(s => div.innerHTML += `<img src="${s}" style="width:48%; margin:1%;">`);
        } else if (type === 'relevant') {
            div.innerHTML = `<img src="${questions[qIdx].rel}" style="width:100%;">`;
        } else {
            div.innerHTML = `<img src="${questions[qIdx].hint}" style="width:100%;">`;
        }
    }

    function nextQuestion() {
        qIdx = (qIdx + 1) % questions.length;
        updateQuiz();
    }

    // --- Level 3 Logic ---
    let tIdx = 0;
    const grammars = [
        ['when.png', 'who.png', 'where.png', 'what.png'],
        ['initiating-event.png'],
        ['attempt.png'],
        ['consequence.png', 'reaction.png']
    ];

    function initLevel3() {
        tIdx = 0;
        renderTeller();
    }

    function renderTeller() {
        document.getElementById('teller-img').src = storyImgs[tIdx];
        const gBox = document.getElementById('grammar-icons');
        gBox.innerHTML = '';
        grammars[tIdx].forEach(icon => {
            const d = document.createElement('div');
            d.className = 'grammar-card';
            d.innerHTML = `<img src="${icon}">`;
            d.onclick = () => d.classList.toggle('checked');
            gBox.appendChild(d);
        });
        document.querySelectorAll('.marker-star').forEach(s => s.remove());
    }

    function placeStar(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        
        const star = document.createElement('div');
        star.className = 'marker-star';
        star.innerText = '⭐';
        star.style.left = x + '%';
        star.style.top = y + '%';
        star.style.pointerEvents = 'auto';

        // 雙擊刪除邏輯
        star.addEventListener('dblclick', (ev) => {
            ev.stopPropagation();
            star.remove();
        });
        
        // 移動端長按或連點模擬
        let lastTap = 0;
        star.addEventListener('touchstart', (ev) => {
            const now = Date.now();
            if (now - lastTap < 300) { star.remove(); }
            lastTap = now;
        });

        e.currentTarget.appendChild(star);
    }

    function tellerNext() {
        if (tIdx < 3) {
            tIdx++; renderTeller();
        } else {
            confetti();
            alert("你好俾心機講故事呀！");
            showLevel(1);
        }
    }

    function showLevel(lvl) {
        document.querySelectorAll('.game-container').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active-level'));
        document.getElementById('level' + lvl).classList.remove('hidden');
        document.querySelectorAll('.level-btn')[lvl-1].classList.add('active-level');
        if(lvl === 1) initLevel1();
        if(lvl === 2) updateQuiz();
        if(lvl === 3) initLevel3();
    }

    window.onload = () => initLevel1();
</script>
</body>
</html>
